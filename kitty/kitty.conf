# kitty config tuned to mirror ~/.dots/ghostty/config as closely as kitty allows

# macOS window chrome
hide_window_decorations titlebar-only
macos_titlebar_color background
remember_window_size yes
remember_window_position yes

# shell / behavior
shell_integration enabled
scrollback_lines 100000000
mouse_hide_wait -1.0
confirm_os_window_close 0

# font
font_family Maple Mono
font_size 16.0

# padding: top right bottom left
window_padding_width 0 4 0 4

# theme: gruvbox-material (matched from Ghostty's built-in theme)
foreground              #d4be98
background              #1d2021
selection_foreground    #7cfb70
selection_background    #2b2c3f
cursor                  #ffffff
cursor_text_color       #000000
color0                  #141617
color1                  #ea6926
color2                  #c1d041
color3                  #eecf75
color4                  #6da3ec
color5                  #fd9bc1
color6                  #fe9d6e
color7                  #ffffff
color8                  #000000
color9                  #d3573b
color10                 #c1d041
color11                 #eecf75
color12                 #2c86ff
color13                 #fd9bc1
color14                 #92a5df
color15                 #ffffff

# match Ghostty convenience bindings
map shift+enter send_text all \x0a
map cmd+equal change_font_size all +2.0
map cmd+plus change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+0 change_font_size all 0
map cmd+, edit_config_file
map cmd+shift+, load_config_file

# let Aerospace / Neovim own these keys
map alt+h
map alt+j
map alt+k
map alt+l
map ctrl+n
