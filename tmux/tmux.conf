##### Core #####

# Prefix / leader
unbind C-b
unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# True color + undercurl support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,usstyle"

# Sensible defaults
set -g history-limit 100000
set -s escape-time 0
set -g display-time 2000
set -g repeat-time 800
set -g renumber-windows on
set -g base-index 1
set -g set-clipboard on
set -g mouse on

# Name windows after their working directory instead of whatever process is running
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

##### Splits (cwd-aware) #####

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### Seamless vim-tmux navigation (Ctrl+h/j/k/l) #####

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Clear terminal (Ctrl+L is taken by nav above)
bind C-l send-keys C-l

# Prefix pane nav (fallback)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Layouts #####

# Cycle layouts (already default on prefix Space, but explicit)
bind Space next-layout

# Quick layouts: editor + terminal below, or side-by-side
bind M-1 select-layout main-vertical    # big left, stacked right
bind M-2 select-layout main-horizontal  # big top, stacked bottom
bind M-3 select-layout tiled            # equal grid
bind M-4 select-layout even-horizontal  # equal columns
bind M-5 select-layout even-vertical    # equal rows

# Zoom toggle (maximize current pane, press again to restore)
# Already default: prefix z

# Balance all panes equally
bind = select-layout tiled

##### Windows #####

unbind c
bind t new-window -c "#{pane_current_path}"
bind -r h select-window -p
bind -r l select-window -n
bind n select-window -n
bind p select-window -p
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

##### Copy mode (vi) #####

set -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection

if-shell 'command -v pbcopy >/dev/null 2>&1' {
  set -g @copy_command 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    set -g @copy_command 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      set -g @copy_command 'xclip -selection clipboard -in'
    }
  }
}

bind -T copy-mode-vi y if-shell -F '#{@copy_command}' 'send-keys -X copy-pipe-and-cancel "#{@copy_command}"' 'send-keys -X copy-selection-and-cancel'

##### Status bar (inherits terminal colors) #####

set -g status on
set -g status-style "bg=default,fg=colour8"
set -g status-justify centre

# Left: empty. Right: current branch for the selected pane only.
set -g status-left ''
set -g status-right-length 50
set -g status-right "#[fg=colour8]#(git -C \"#{pane_current_path}\" symbolic-ref --quiet --short HEAD 2>/dev/null || true) "

# Windows: show index + cwd basename only
set -g window-status-format         "#[fg=colour7] #I #{b:pane_current_path} "
set -g window-status-current-format "#[fg=colour4,bold] #I #{b:pane_current_path} "

# Borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"

# Toggle status
bind b set -g status

set -g extended-keys on
set -g extended-keys-format csi-u

##### Plugins #####

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Easier with your Ctrl-Space prefix than Ctrl-s / Ctrl-r.
# Bind both uppercase and lowercase so you don't have to think about Shift.
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
bind s run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh'
bind r run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'
set -g @resurrect-capture-pane-contents 'on'

# Auto-save + auto-restore tmux sessions.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
